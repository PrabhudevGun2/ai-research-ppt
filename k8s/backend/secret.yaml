# IMPORTANT: Replace <BASE64_ENCODED_KEY> with:
#   echo -n "sk-or-v1-your-key" | base64
# Or create via kubectl (recommended):
#   kubectl create secret generic api-keys \
#     --from-literal=OPENROUTER_API_KEY=sk-or-v1-your-key \
#     -n ai-research-ppt
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: ai-research-ppt
type: Opaque
data:
  OPENROUTER_API_KEY: <BASE64_ENCODED_KEY>
