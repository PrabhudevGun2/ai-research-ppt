apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-research-ppt
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ai-research-ppt-backend:latest
          imagePullPolicy: Never   # Use local minikube image
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: OPENROUTER_API_KEY
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: ppt-outputs
              mountPath: /app/outputs
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: ppt-outputs
          persistentVolumeClaim:
            claimName: ppt-outputs-pvc
