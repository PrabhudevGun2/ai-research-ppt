services:
  # --- Backend (FastAPI) ---
  - type: web
    name: ai-ppt-backend
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: OPENROUTER_API_KEY
        value: ""
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.0-flash-001
      - key: REDIS_URL
        fromService:
          name: ai-ppt-redis
          type: redis
          property: connectionString
      - key: OUTPUT_DIR
        value: /app/outputs
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/v1/health

  # --- Frontend (Next.js) ---
  - type: web
    name: ai-ppt-frontend
    runtime: docker
    dockerfilePath: ./frontend-next/Dockerfile
    dockerContext: ./frontend-next
    plan: free
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://ai-ppt-backend-u6fo.onrender.com

  # --- Redis ---
  - type: redis
    name: ai-ppt-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only internal access
